name: Deploy to gh-pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_CALENDLY_URL: https://calendly.com/yorgopecas/discovery-call
          VITE_LEAD_WEBHOOK_URL: https://eo24d7w9f19jqw1.m.pipedream.net
          VITE_GA_ID: G-MSY0MHMWPV
          VITE_PLAUSIBLE_DOMAIN: ''

      - name: Publish dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
